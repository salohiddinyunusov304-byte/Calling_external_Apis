server:
  port: 8080
valyuta-course: https://cbu.uz/uz/arkhiv-kursov-valyut/json/
spring:
  application:
    name: calling_external_api
  datasource:
    url: jdbc:h2:file:./db
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
comment-server:
  basu-url: http://localhost:7070
  get-comment-by-post-id: /api/comments/findByPostId/{0}
  create: ${comment-server.basu-url}/api/comments/create